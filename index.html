<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'retro': ['"Press Start 2P"', 'cursive'],
                        'sans': ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
        }

        .game-card {
            transition: all 0.2s ease;
            background: #1e293b; /* Slate 800 */
            border: 2px solid #334155; /* Slate 700 */
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6; /* Blue 500 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .game-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(2px);
        }

        /* Custom Fullscreen Classes */
        .css-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            z-index: 9999 !important;
            background-color: #0f172a !important;
            margin: 0 !important;
            padding: 1rem !important;
            box-sizing: border-box !important;
        }
        
        .css-fullscreen #game-container {
            height: auto !important;
            flex-grow: 1 !important;
            min-height: 0 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header id="site-header" class="text-center py-10">
        <h1 class="font-retro text-3xl md:text-5xl text-white mb-4 tracking-wider">
            RETRO WORLD
        </h1>
        <p class="font-sans text-slate-400 text-lg md:text-xl font-semibold tracking-widest">
            <i class="fas fa-gamepad mr-2 text-blue-500"></i> PLAY CLASSIC GAMES <i class="fas fa-gamepad ml-2 text-blue-500"></i>
        </p>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 pb-12 flex-grow">
        
        <!-- Search Bar -->
        <div class="max-w-md mx-auto mb-8 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fas fa-search text-slate-500"></i>
            </div>
            <input type="text" id="search-input" class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-lg leading-5 bg-slate-800 text-slate-300 placeholder-slate-500 focus:outline-none focus:bg-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" placeholder="Search games...">
        </div>
        
        <!-- Game Library Grid -->
        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Game Cards will be injected here by JavaScript -->
        </div>

        <!-- Game Player View (Hidden by default) -->
        <div id="player-view" class="hidden flex-col w-full max-w-5xl mx-auto mt-4">
            <div class="w-full flex flex-col sm:flex-row justify-between items-center mb-4 bg-slate-800 border-b border-slate-600 pb-4 px-2 sm:px-0">
                <h2 id="now-playing-title" class="font-retro text-lg sm:text-xl text-blue-400 truncate mb-4 sm:mb-0">Now Playing</h2>
                <div class="flex gap-2 sm:gap-4 w-full sm:w-auto justify-center">
                    <button onclick="toggleFullscreen()" class="px-4 sm:px-6 py-2 sm:py-3 font-bold text-xs text-white bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded transition-colors flex items-center">
                        <i id="fs-icon" class="fas fa-expand mr-2"></i> <span id="fs-text">FULLSCREEN</span>
                    </button>
                    <button onclick="closeGame()" class="px-4 sm:px-6 py-2 sm:py-3 font-bold text-xs text-white bg-red-600 hover:bg-red-500 border border-red-700 rounded transition-colors flex items-center">
                        <i class="fas fa-arrow-left mr-2"></i> <span>BACK TO MENU</span>
                    </button>
                </div>
            </div>
            
            <div id="game-container" class="w-full h-[75vh] min-h-[500px] border-2 border-slate-600 rounded-lg overflow-hidden shadow-2xl bg-black relative flex flex-col">
                <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center text-blue-500 z-0 bg-slate-900">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                    <p class="font-retro text-xs text-slate-300">INSERT COIN...</p>
                </div>
                <iframe 
                    id="game-iframe" 
                    class="w-full h-full relative z-10 flex-grow" 
                    frameborder="0" 
                    allow="autoplay; fullscreen"
                    allowfullscreen
                    onload="document.getElementById('loading-spinner').style.display='none';"
                ></iframe>
            </div>
            
            <div class="mt-6 bg-slate-800 p-4 rounded-lg border border-slate-700">
                <p class="text-slate-300 font-sans text-sm text-center">
                    <i class="fas fa-keyboard mr-2 text-blue-400"></i>
                    <strong class="text-white">CONTROLS:</strong> 
                    <span id="game-controls-text">Click inside the game window to enable controls.</span>
                </p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer id="site-footer" class="text-center py-6 border-t border-slate-800 mt-auto bg-slate-900">
        <p class="font-sans text-slate-500 text-sm">
            Powered by <a href="https://archive.org" class="text-blue-400 hover:text-blue-300 transition">Internet Archive</a> and <a href="https://playclassic.games" class="text-blue-400 hover:text-blue-300 transition">PlayClassic.games</a>
        </p>
    </footer>

         const gameGrid = document.getElementById('game-grid');
        
        function renderGames() {
            // Get search query
            const searchInput = document.getElementById('search-input');
            const searchQuery = searchInput ? searchInput.value.toLowerCase() : '';

            // Clear current grid
            gameGrid.innerHTML = '';

            // Filter and Sort games
            const filteredGames = games.filter(game => game.title.toLowerCase().includes(searchQuery));
            filteredGames.sort((a, b) => a.title.localeCompare(b.title));

            if (filteredGames.length === 0) {
                gameGrid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10 font-sans">No games found matching your search.</div>';
                return;
            }

            filteredGames.forEach((game) => {
                const card = document.createElement('div');
                card.className = 'game-card rounded-lg overflow-hidden flex flex-col group h-72';
                card.onclick = () => playGame(game);
                
                // Dynamic fallback image generator. Encode URI and replace single quotes to prevent breaking inline JS.
                const fallbackText = encodeURIComponent(game.title).replace(/'/g, "%27");
                const fallbackUrl = `https://placehold.co/400x300/1e293b/ffffff?text=${fallbackText}&font=Outfit`;

                card.innerHTML = `
                    <div class="relative w-full h-48 bg-black overflow-hidden flex-shrink-0 border-b border-slate-700">
                        <img src="${game.img}" alt="${game.title}" class="w-full h-full object-cover object-top opacity-80 group-hover:opacity-100 transition-opacity" onerror="this.onerror=null; this.src='${fallbackUrl}'">
                        
                        <div class="play-overlay absolute inset-0 opacity-0 flex items-center justify-center transition-opacity duration-300">
                            <div class="w-16 h-16 rounded-full bg-blue-500 text-white flex items-center justify-center shadow-lg">
                                <i class="fas fa-play text-2xl ml-1"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4 flex-grow flex flex-col justify-between">
                        <h3 class="font-sans font-bold text-white text-lg truncate" title="${game.title}">${game.title}</h3>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-white ${game.systemColor} px-2 py-1 rounded">${game.system}</span>
                            <i class="fas fa-gamepad text-slate-500 group-hover:text-blue-400 transition-colors"></i>
                        </div>
                    </div>
                `;
                gameGrid.appendChild(card);
            });
        }
        // Logic for Player View
        const gridView = document.getElementById('game-grid');
        const playerView = document.getElementById('player-view');
        const iframe = document.getElementById('game-iframe');
        const playingTitle = document.getElementById('now-playing-title');
        const loadingSpinner = document.getElementById('loading-spinner');
        const controlsText = document.getElementById('game-controls-text');

        function playGame(game) {
            // Update UI
            playingTitle.innerText = `${game.title}`;
            controlsText.innerText = systemControls[game.system] || 'Click inside game window to enable controls.';
            
            gridView.classList.add('hidden');
            playerView.classList.remove('hidden');
            playerView.classList.add('flex');
            
            // Set Loading state
            loadingSpinner.style.display = 'flex';
            
            // Load Game
            iframe.src = game.url;
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeGame() {
            if (isFullscreen) toggleFullscreen();
            
            // Stop game audio/processing by removing src
            iframe.src = '';
            
            // Update UI
            playerView.classList.add('hidden');
            playerView.classList.remove('flex');
            gridView.classList.remove('hidden');
        }

        let isFullscreen = false;

        function toggleFullscreen() {
            const playerViewElement = document.getElementById('player-view');
            const fsIcon = document.getElementById('fs-icon');
            const fsText = document.getElementById('fs-text');
            const header = document.getElementById('site-header');
            const footer = document.getElementById('site-footer');
            
            isFullscreen = !isFullscreen;
            
            if (isFullscreen) {
                // Activate pseudo-fullscreen
                playerViewElement.classList.add('css-fullscreen');
                document.body.style.overflow = 'hidden'; // Stop background scrolling
                
                // Hide Header and Footer
                header.style.display = 'none';
                footer.style.display = 'none';

                // Update Button UI
                fsIcon.classList.remove('fa-expand');
                fsIcon.classList.add('fa-compress');
                fsText.innerText = 'EXIT FULLSCREEN';
            } else {
                // Deactivate pseudo-fullscreen
                playerViewElement.classList.remove('css-fullscreen');
                document.body.style.overflow = ''; // Restore scrolling
                
                // Show Header and Footer
                header.style.display = 'block';
                footer.style.display = 'block';

                // Update Button UI
                fsIcon.classList.remove('fa-compress');
                fsIcon.classList.add('fa-expand');
                fsText.innerText = 'FULLSCREEN';
            }
        }

        // Initialize application
        window.onload = () => {
            renderGames();
            // Setup search listener
            document.getElementById('search-input').addEventListener('input', renderGames);
        };
    </script>
